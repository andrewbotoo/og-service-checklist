<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarterly Service Checklist — Our Gatekeeper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0d0f12;
  --surface: #13161b;
  --surface2: #1a1e25;
  --border: #252930;
  --border2: #2e333c;
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #00d4a0;
  --accent2: #00a87e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --improve: #a78bfa;
  --radius: 10px;
  --radius-lg: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* HEADER */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,15,18,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.brand-icon svg { width: 18px; height: 18px; }
.brand-name {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.02em;
}
.brand-name span { color: var(--accent); }
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-pill {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 20px;
}
.progress-pill span { color: var(--accent); font-weight: 500; }

/* MAIN LAYOUT */
.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* PAGE TITLE */
.page-title {
  margin-bottom: 2rem;
}
.page-title h1 {
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.page-title p {
  font-size: 14px;
  color: var(--muted);
}
.engineer-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 14px 5px 8px;
  margin-top: 12px;
}
.eng-avatar {
  width: 24px;
  height: 24px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #0d0f12;
}
.eng-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.eng-role { font-size: 12px; color: var(--muted); }

/* VISIT DETAILS */
.visit-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.visit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem;
}
@media(max-width:600px){ .visit-grid { grid-template-columns: 1fr; } }
.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
select, input[type="date"], input[type="text"], textarea {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
  appearance: none;
}
select:focus, input:focus, textarea:focus {
  border-color: var(--accent);
}
select option { background: var(--surface2); }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

/* PROGRESS BAR */
.progress-section { margin-bottom: 1.5rem; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.prog-label { font-size: 13px; color: var(--muted); }
.prog-label strong { color: var(--text); }
.flag-label { font-size: 12px; color: var(--danger); font-family: 'DM Mono', monospace; }
.prog-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* SECTION */
.check-section { margin-bottom: 1.75rem; }
.section-header {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-radius: var(--radius);
  gap: 10px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.section-header:hover { background: var(--surface2); }
.section-chevron {
  margin-left: auto;
  width: 18px;
  height: 18px;
  color: var(--muted);
  transition: transform 0.25s;
  flex-shrink: 0;
}
.check-section.open .section-chevron { transform: rotate(180deg); }
.section-body {
  display: none;
  padding: 0 0 4px 0;
}
.check-section.open .section-body { display: block; }

/* CHECK ITEM */
.check-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  transition: all 0.15s;
}
.check-item.is-done { border-color: rgba(0,212,160,0.35); background: rgba(0,212,160,0.05); }
.check-item.is-flagged { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.05); }
.check-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.check-controls {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 1px;
  flex-shrink: 0;
}
.tick-btn, .flag-btn {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.tick-btn:hover { border-color: var(--accent); }
.flag-btn:hover { border-color: var(--danger); }
.tick-btn.active { background: var(--accent); border-color: var(--accent); }
.flag-btn.active { background: var(--danger); border-color: var(--danger); }
.tick-btn svg, .flag-btn svg { width: 14px; height: 14px; }
.check-body { flex: 1; min-width: 0; }
.check-label { font-size: 14px; color: var(--text); line-height: 1.45; }
.check-hint { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.note-area {
  margin-top: 10px;
  display: none;
}
.note-area.show { display: block; }
.note-area textarea {
  font-size: 13px;
  min-height: 56px;
  padding: 8px 10px;
  color: var(--text);
  border-color: rgba(239,68,68,0.3);
}
.note-area textarea:focus { border-color: var(--danger); }

/* SUMMARY */
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.summary-title {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.stat-tile {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.stat-val { font-size: 24px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
.val-green { color: var(--accent); }
.val-red { color: var(--danger); }

/* ACTION BUTTONS */
.action-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 140px;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary {
  background: var(--accent);
  color: #0d0f12;
}
.btn-primary:hover { background: var(--accent2); }
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { border-color: var(--muted); }
.btn-pdf {
  background: rgba(167,139,250,0.15);
  color: #a78bfa;
  border: 1px solid rgba(167,139,250,0.3);
}
.btn-pdf:hover { background: rgba(167,139,250,0.25); }
</style>
